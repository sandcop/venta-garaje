document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

order-radius:12px; border:1.5px solid #eee; background:#fff; color:#8a7660; font-weight:600; cursor:pointer;\" style-hover=\"background:#faf7f2;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ submitPassword }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:#D9480F; color:#fff; font-weight:600; cursor:pointer;\" style-hover=\"background:#B8380B;\">Confirmar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Card action menu -->\n  <sc-if value=\"{{ showActionMenu }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(58,46,32,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;\" onclick=\"{{ closeModalsOnBackdrop }}\">\n      <div style=\"background:#fff; border-radius:18px; padding:22px 22px 14px; width:100%; max-width:320px; box-shadow:0 20px 50px rgba(0,0,0,0.25); animation:popIn 0.2s ease-out;\" onclick=\"{{ stopClick }}\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-size:19px; font-weight:600; color:#3A2E20; margin-bottom:2px;\">{{ actionMenuProductName }}<\u002Fdiv>\n        <div style=\"font-size:13px; color:#8a7660; margin-bottom:14px;\">Opciones de administrador<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <button onclick=\"{{ actionMenuToggleSold }}\" style=\"padding:12px; border-radius:12px; border:none; background:#FFF3E0; color:#B8380B; font-weight:600; font-size:14px; cursor:pointer; text-align:left;\" style-hover=\"background:#FFE8CC;\">{{ actionMenuSoldLabel }}<\u002Fbutton>\n          <button onclick=\"{{ actionMenuEditPrice }}\" style=\"padding:12px; border-radius:12px; border:none; background:#FFF3E0; color:#B8380B; font-weight:600; font-size:14px; cursor:pointer; text-align:left;\" style-hover=\"background:#FFE8CC;\">Editar precio<\u002Fbutton>\n          <button onclick=\"{{ actionMenuChangePhoto }}\" style=\"padding:12px; border-radius:12px; border:none; background:#FFF3E0; color:#B8380B; font-weight:600; font-size:14px; cursor:pointer; text-align:left;\" style-hover=\"background:#FFE8CC;\">Cambiar foto<\u002Fbutton>\n          <button onclick=\"{{ actionMenuDelete }}\" style=\"padding:12px; border-radius:12px; border:none; background:#FDEAEA; color:#C0392B; font-weight:600; font-size:14px; cursor:pointer; text-align:left;\" style-hover=\"background:#FBDADA;\">Eliminar producto<\u002Fbutton>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeActionMenu }}\" style=\"width:100%; margin-top:10px; padding:11px; border-radius:12px; border:1.5px solid #eee; background:#fff; color:#8a7660; font-weight:600; cursor:pointer;\" style-hover=\"background:#faf7f2;\">Cerrar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Delete confirm modal -->\n  <sc-if value=\"{{ showDeleteConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(58,46,32,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;\" onclick=\"{{ closeModalsOnBackdrop }}\">\n      <div style=\"background:#fff; border-radius:18px; padding:26px 24px; width:100%; max-width:320px; box-shadow:0 20px 50px rgba(0,0,0,0.25); animation:popIn 0.2s ease-out;\" onclick=\"{{ stopClick }}\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-size:20px; font-weight:600; color:#3A2E20; margin-bottom:6px;\">¿Eliminar producto?<\u002Fdiv>\n        <div style=\"font-size:13px; color:#8a7660; margin-bottom:14px;\">{{ deleteConfirmProductName }} — esta acción no se puede deshacer.<\u002Fdiv>\n        <div style=\"display:flex; gap:10px;\">\n          <button onclick=\"{{ cancelDeleteConfirm }}\" style=\"flex:1; padding:11px; border-radius:12px; border:1.5px solid #eee; background:#fff; color:#8a7660; font-weight:600; cursor:pointer;\" style-hover=\"background:#faf7f2;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ confirmDelete }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:#C0392B; color:#fff; font-weight:600; cursor:pointer;\" style-hover=\"background:#A93226;\">Eliminar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Edit price modal -->\n  <sc-if value=\"{{ showEditPriceModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(58,46,32,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;\" onclick=\"{{ closeModalsOnBackdrop }}\">\n      <div style=\"background:#fff; border-radius:18px; padding:26px 24px; width:100%; max-width:320px; box-shadow:0 20px 50px rgba(0,0,0,0.25); animation:popIn 0.2s ease-out;\" onclick=\"{{ stopClick }}\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-size:20px; font-weight:600; color:#3A2E20; margin-bottom:6px;\">Editar precio<\u002Fdiv>\n        <div style=\"font-size:13px; color:#8a7660; margin-bottom:14px;\">{{ editPriceProductName }}<\u002Fdiv>\n        <input type=\"number\" value=\"{{ editPriceValue }}\" onchange=\"{{ updateEditPriceValue }}\" placeholder=\"Nuevo precio\" style=\"width:100%; box-sizing:border-box; padding:12px 14px; border-radius:12px; border:1.5px solid #FFD8A8; font-size:15px; outline:none;\">\n        <div style=\"display:flex; gap:10px; margin-top:16px;\">\n          <button onclick=\"{{ cancelEditPriceModal }}\" style=\"flex:1; padding:11px; border-radius:12px; border:1.5px solid #eee; background:#fff; color:#8a7660; font-weight:600; cursor:pointer;\" style-hover=\"background:#faf7f2;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ submitEditPrice }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:#D9480F; color:#fff; font-weight:600; cursor:pointer;\" style-hover=\"background:#B8380B;\">Guardar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- Add product modal -->\n  <sc-if value=\"{{ showAddModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; background:rgba(58,46,32,0.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;\" onclick=\"{{ closeModalsOnBackdrop }}\">\n      <div style=\"background:#fff; border-radius:18px; padding:26px 24px; width:100%; max-width:380px; box-shadow:0 20px 50px rgba(0,0,0,0.25); animation:popIn 0.2s ease-out;\" onclick=\"{{ stopClick }}\">\n        <div style=\"font-family:'Fredoka',sans-serif; font-size:20px; font-weight:600; color:#3A2E20; margin-bottom:16px;\">Añadir producto<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <input type=\"text\" value=\"{{ newName }}\" onchange=\"{{ updateNewName }}\" placeholder=\"Nombre del producto\" style=\"padding:12px 14px; border-radius:12px; border:1.5px solid #FFD8A8; font-size:14px; outline:none;\">\n          <input type=\"number\" value=\"{{ newPrice }}\" onchange=\"{{ updateNewPrice }}\" placeholder=\"Precio (ej. 15)\" style=\"padding:12px 14px; border-radius:12px; border:1.5px solid #FFD8A8; font-size:14px; outline:none;\">\n          <select value=\"{{ newCategory }}\" onchange=\"{{ updateNewCategory }}\" style=\"padding:12px 14px; border-radius:12px; border:1.5px solid #FFD8A8; font-size:14px; outline:none; background:#fff;\">\n            <sc-for list=\"{{ realCategories }}\" as=\"cat\" hint-placeholder-count=\"6\">\n              <option value=\"{{ cat.name }}\">{{ cat.name }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-top:20px;\">\n          <button onclick=\"{{ cancelAddModal }}\" style=\"flex:1; padding:11px; border-radius:12px; border:1.5px solid #eee; background:#fff; color:#8a7660; font-weight:600; cursor:pointer;\" style-hover=\"background:#faf7f2;\">Cancelar<\u002Fbutton>\n          <button onclick=\"{{ submitNewProduct }}\" style=\"flex:1; padding:11px; border-radius:12px; border:none; background:#D9480F; color:#fff; font-weight:600; cursor:pointer;\" style-hover=\"background:#B8380B;\">Guardar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst ADMIN_PASSWORD = \"venta123\";\nconst STORAGE_KEY = \"garageSaleProducts_v1\";\n\nconst DEFAULT_PRODUCTS = [\n  { id: 1, name: \"Silla de madera vintage\", price: 25, category: \"Muebles\", sold: false, slotId: \"product-1\" },\n  { id: 2, name: \"Chaqueta de mezclilla\", price: 12, category: \"Ropa\", sold: false, slotId: \"product-2\" },\n  { id: 3, name: \"Lámpara de mesa\", price: 18, category: \"Hogar\", sold: true, slotId: \"product-3\" },\n  { id: 4, name: \"Set de libros de cocina\", price: 8, category: \"Libros\", sold: false, slotId: \"product-4\" },\n  { id: 5, name: \"Bicicleta rodado 26\", price: 60, category: \"Otros\", sold: false, slotId: \"product-5\" },\n  { id: 6, name: \"Bocina Bluetooth\", price: 22, category: \"Electrónica\", sold: false, slotId: \"product-6\" },\n  { id: 7, name: \"Caja de juguetes\", price: 10, category: \"Juguetes\", sold: false, slotId: \"product-7\" },\n  { id: 8, name: \"Espejo decorativo\", price: 15, category: \"Hogar\", sold: false, slotId: \"product-8\" },\n  { id: 9, name: \"Zapatillas talla 38\", price: 14, category: \"Ropa\", sold: false, slotId: \"product-9\" },\n  { id: 10, name: \"Mesa de centro\", price: 35, category: \"Muebles\", sold: false, slotId: \"product-10\" },\n  { id: 11, name: \"Consola de videojuegos\", price: 45, category: \"Electrónica\", sold: false, slotId: \"product-11\" },\n  { id: 12, name: \"Rompecabezas 1000 piezas\", price: 6, category: \"Juguetes\", sold: false, slotId: \"product-12\" },\n];\n\nconst ALL_CATEGORIES = [\"Todos\", \"Ropa\", \"Muebles\", \"Electrónica\", \"Hogar\", \"Juguetes\", \"Libros\", \"Otros\"];\n\nclass Component extends DCLogic {\n  state = {\n    products: DEFAULT_PRODUCTS,\n    activeCategory: \"Todos\",\n    unlockedPhotoIds: [],\n    showPasswordModal: false,\n    passwordInput: \"\",\n    passwordError: false,\n    pendingAction: null,\n    showAddModal: false,\n    newName: \"\",\n    newPrice: \"\",\n    newCategory: \"Ropa\",\n    nextId: 13,\n    showEditPriceModal: false,\n    editPriceId: null,\n    editPriceValue: \"\",\n    showActionMenu: false,\n    actionMenuId: null,\n    showDeleteConfirm: false,\n    deleteConfirmId: null,\n    filledSlotIds: [],\n  };\n\n  _longPressTimer = null;\n  _longPressFired = false;\n  _photoUnlockTimers = {};\n  _filledObserver = null;\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(STORAGE_KEY);\n      if (raw) {\n        const saved = JSON.parse(raw);\n        if (saved && Array.isArray(saved.products)) {\n          this.setState({ products: saved.products, nextId: saved.nextId || 13 });\n        }\n      }\n    } catch (e) {}\n  }\n\n  gridRef = (el) => {\n    if (!el || this._filledObserver) return;\n    this._gridEl = el;\n    const recompute = () => {\n      const ids = [...el.querySelectorAll('image-slot[data-filled]')]\n        .map(s => s.id)\n        .filter(Boolean);\n      this.setState({ filledSlotIds: ids });\n    };\n    this._filledObserver = new MutationObserver(recompute);\n    this._filledObserver.observe(el, { attributes: true, attributeFilter: ['data-filled'], subtree: true });\n    recompute();\n  };\n\n  componentWillUnmount() {\n    if (this._filledObserver) this._filledObserver.disconnect();\n  }\n\n  persist(products, nextId) {\n    try {\n      localStorage.setItem(STORAGE_KEY, JSON.stringify({ products, nextId: nextId ?? this.state.nextId }));\n    } catch (e) {}\n  }\n\n  selectCategory = (e) => {\n    const cat = e.currentTarget.getAttribute('data-cat');\n    this.setState({ activeCategory: cat });\n  };\n\n  chipStyleFor(cat) {\n    const active = cat === this.state.activeCategory;\n    return `padding:9px 18px; border-radius:999px; border:none; font-weight:600; font-size:13.5px; white-space:nowrap; cursor:pointer; flex-shrink:0; transition:filter .15s; ${\n      active\n        ? \"background:#D9480F; color:#fff;\"\n        : \"background:#FFF3E0; color:#B8380B;\"\n    }`;\n  }\n\n  soldLabelFor(p) { return p.sold ? \"Marcar disponible\" : \"Marcar vendido\"; }\n  soldStyleFor(p) {\n    return `padding:9px 10px; border-radius:10px; border:none; font-weight:600; font-size:12.5px; cursor:pointer; margin-top:auto; ${\n      p.sold ? \"background:#FFF3E0; color:#B8380B;\" : \"background:#3A2E20; color:#fff;\"\n    }`;\n  }\n\n  toggleSold = (e) => {\n    const id = Number(e.currentTarget.getAttribute('data-id'));\n    const product = this.state.products.find(p => p.id === id);\n    if (!product) return;\n    this.setState({ showPasswordModal: true, passwordInput: \"\", passwordError: false, pendingAction: { type: 'toggleSold', id } });\n  };\n\n  applyToggleSold(id) {\n    const products = this.state.products.map(p => p.id === id ? { ...p, sold: !p.sold } : p);\n    this.setState({ products });\n    this.persist(products);\n  }\n\n  soldButtonLabel(p) {\n    return p.sold ? \"Marcar disponible\" : \"Marcar vendido\";\n  }\n\n  soldButtonStyle(p) {\n    return `padding:9px 10px; border-radius:10px; border:none; font-weight:600; font-size:12.5px; cursor:pointer; margin-top:auto; ${\n      p.sold ? \"background:#FFF3E0; color:#B8380B;\" : \"background:#3A2E20; color:#fff;\"\n    }`;\n  }\n\n  _lastTapId = null;\n  _lastTapTime = 0;\n\n  handleCardTap = (e) => {\n    const id = Number(e.currentTarget.getAttribute('data-id'));\n    const now = Date.now();\n    if (this._lastTapId === id && now - this._lastTapTime < 500) {\n      this._lastTapId = null;\n      this._lastTapTime = 0;\n      this.setState({ showPasswordModal: true, passwordInput: \"\", passwordError: false, pendingAction: { type: 'openActionMenu', id } });\n      return;\n    }\n    this._lastTapId = id;\n    this._lastTapTime = now;\n  };\n\n  preventDefault = (e) => e.preventDefault();\n\n  unlockPhotoTemporarily(id) {\n    clearTimeout(this._photoUnlockTimers[id]);\n    this.setState(s => ({ unlockedPhotoIds: [...s.unlockedPhotoIds.filter(x => x !== id), id] }));\n    this._photoUnlockTimers[id] = setTimeout(() => {\n      this.setState(s => ({ unlockedPhotoIds: s.unlockedPhotoIds.filter(x => x !== id) }));\n    }, 60000);\n  }\n\n  openActionMenu(id) {\n    this.setState({ showActionMenu: true, actionMenuId: id });\n  }\n\n  closeActionMenu = () => this.setState({ showActionMenu: false, actionMenuId: null });\n\n  actionMenuToggleSold = () => {\n    if (this.state.actionMenuId != null) this.applyToggleSold(this.state.actionMenuId);\n    this.setState({ showActionMenu: false, actionMenuId: null });\n  };\n\n  actionMenuEditPrice = () => {\n    const id = this.state.actionMenuId;\n    this.setState({ showActionMenu: false, actionMenuId: null });\n    if (id != null) this.openEditPriceModal(id);\n  };\n\n  actionMenuChangePhoto = () => {\n    const id = this.state.actionMenuId;\n    this.setState({ showActionMenu: false, actionMenuId: null });\n    if (id != null) this.unlockPhotoTemporarily(id);\n  };\n\n  actionMenuDelete = () => {\n    const id = this.state.actionMenuId;\n    this.setState({ showActionMenu: false, actionMenuId: null, showDeleteConfirm: true, deleteConfirmId: id });\n  };\n\n  cancelDeleteConfirm = () => this.setState({ showDeleteConfirm: false, deleteConfirmId: null });\n\n  confirmDelete = () => {\n    const id = this.state.deleteConfirmId;\n    const products = this.state.products.filter(p => p.id !== id);\n    this.setState({ products, showDeleteConfirm: false, deleteConfirmId: null });\n    this.persist(products);\n  };\n\n  openAddFlow = () => {\n    this.setState({ showPasswordModal: true, passwordInput: \"\", passwordError: false, pendingAction: { type: 'openAdd' } });\n  };\n\n  updatePasswordInput = (e) => this.setState({ passwordInput: e.target.value, passwordError: false });\n\n  submitPassword = () => {\n    if (this.state.passwordInput === ADMIN_PASSWORD) {\n      const action = this.state.pendingAction;\n      this.setState({ showPasswordModal: false, passwordInput: \"\", passwordError: false, pendingAction: null });\n      if (action && action.type === 'toggleSold') {\n        this.applyToggleSold(action.id);\n      } else if (action && action.type === 'openAdd') {\n        this.setState({ showAddModal: true, newName: \"\", newPrice: \"\", newCategory: \"Ropa\" });\n      } else if (action && action.type === 'editPrice') {\n        this.openEditPriceModal(action.id);\n      } else if (action && action.type === 'openActionMenu') {\n        this.openActionMenu(action.id);\n      }\n    } else {\n      this.setState({ passwordError: true });\n    }\n  };\n\n  cancelPasswordModal = () => this.setState({ showPasswordModal: false, pendingAction: null, passwordInput: \"\", passwordError: false });\n\n  updateNewName = (e) => this.setState({ newName: e.target.value });\n  updateNewPrice = (e) => this.setState({ newPrice: e.target.value });\n  updateNewCategory = (e) => this.setState({ newCategory: e.target.value });\n\n  submitNewProduct = () => {\n    const name = this.state.newName.trim();\n    const price = parseFloat(this.state.newPrice);\n    if (!name || isNaN(price)) return;\n    const id = this.state.nextId;\n    const product = { id, name, price, category: this.state.newCategory, sold: false, slotId: `product-${id}` };\n    const products = [...this.state.products, product];\n    const nextId = id + 1;\n    this.setState({ products, nextId, showAddModal: false, newName: \"\", newPrice: \"\" });\n    this.persist(products, nextId);\n  };\n\n  cancelAddModal = () => this.setState({ showAddModal: false });\n\n  openEditPriceModal(id) {\n    const product = this.state.products.find(p => p.id === id);\n    if (!product) return;\n    this.setState({ showEditPriceModal: true, editPriceId: id, editPriceValue: String(product.price) });\n  }\n\n  updateEditPriceValue = (e) => this.setState({ editPriceValue: e.target.value });\n\n  submitEditPrice = () => {\n    const price = parseFloat(this.state.editPriceValue);\n    if (isNaN(price) || price < 0) return;\n    const products = this.state.products.map(p => p.id === this.state.editPriceId ? { ...p, price } : p);\n    this.setState({ products, showEditPriceModal: false, editPriceId: null });\n    this.persist(products);\n  };\n\n  cancelEditPriceModal = () => this.setState({ showEditPriceModal: false, editPriceId: null });\n\n  stopClick = (e) => e.stopPropagation();\n  closeModalsOnBackdrop = () => this.setState({ showPasswordModal: false, showAddModal: false, showEditPriceModal: false, showActionMenu: false, actionMenuId: null, showDeleteConfirm: false, deleteConfirmId: null, pendingAction: null, passwordInput: \"\", passwordError: false });\n\n  renderVals() {\n    const activeCategory = this.state.activeCategory;\n    const rawVisible = activeCategory === \"Todos\"\n      ? this.state.products\n      : this.state.products.filter(p => p.category === activeCategory);\n    const unlockedPhotoIds = this.state.unlockedPhotoIds;\n    const visibleProducts = rawVisible.map(p => ({\n      ...p,\n      soldLabel: this.soldLabelFor(p),\n      soldStyle: this.soldStyleFor(p),\n      photoPointerEvents: unlockedPhotoIds.includes(p.id) ? \"auto\" : \"none\",\n      photoLocked: !unlockedPhotoIds.includes(p.id),\n      lockOverlayBg: this.state.filledSlotIds.includes(p.slotId) ? \"transparent\" : \"#FFF3E0\",\n    }));\n\n    const actionMenuProduct = this.state.products.find(p => p.id === this.state.actionMenuId);\n\n    const categories = ALL_CATEGORIES.map(name => ({ name, style: this.chipStyleFor(name) }));\n    const realCategories = categories.filter(c => c.name !== \"Todos\");\n\n    return {\n      categories,\n      realCategories,\n      visibleProducts,\n      gridRef: this.gridRef,\n      noResults: visibleProducts.length === 0,\n      selectCategory: this.selectCategory,\n      handleCardTap: this.handleCardTap,\n      preventDefault: this.preventDefault,\n      showActionMenu: this.state.showActionMenu,\n      actionMenuProductName: actionMenuProduct ? actionMenuProduct.name : \"\",\n      actionMenuSoldLabel: actionMenuProduct ? this.soldLabelFor(actionMenuProduct) : \"\",\n      actionMenuToggleSold: this.actionMenuToggleSold,\n      actionMenuEditPrice: this.actionMenuEditPrice,\n      actionMenuChangePhoto: this.actionMenuChangePhoto,\n      actionMenuDelete: this.actionMenuDelete,\n      closeActionMenu: this.closeActionMenu,\n      showDeleteConfirm: this.state.showDeleteConfirm,\n      deleteConfirmProductName: (this.state.products.find(p => p.id === this.state.deleteConfirmId) || {}).name || \"\",\n      cancelDeleteConfirm: this.cancelDeleteConfirm,\n      confirmDelete: this.confirmDelete,\n      showEditPriceModal: this.state.showEditPriceModal,\n      editPriceValue: this.state.editPriceValue,\n      editPriceProductName: (this.state.products.find(p => p.id === this.state.editPriceId) || {}).name || \"\",\n      updateEditPriceValue: this.updateEditPriceValue,\n      submitEditPrice: this.submitEditPrice,\n      cancelEditPriceModal: this.cancelEditPriceModal,\n      openAddFlow: this.openAddFlow,\n      showPasswordModal: this.state.showPasswordModal,\n      passwordInput: this.state.passwordInput,\n      passwordError: this.state.passwordError,\n      updatePasswordInput: this.updatePasswordInput,\n      submitPassword: this.submitPassword,\n      cancelPasswordModal: this.cancelPasswordModal,\n      showAddModal: this.state.showAddModal,\n      newName: this.state.newName,\n      newPrice: this.state.newPrice,\n      newCategory: this.state.newCategory,\n      updateNewName: this.updateNewName,\n      updateNewPrice: this.updateNewPrice,\n      updateNewCategory: this.updateNewCategory,\n      submitNewProduct: this.submitNewProduct,\n      cancelAddModal: this.cancelAddModal,\n      stopClick: this.stopClick,\n      closeModalsOnBackdrop: this.closeModalsOnBackdrop,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
